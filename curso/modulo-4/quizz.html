<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Módulo 05</title>

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: #fff;
  padding: 2rem;
}

.card {
  background: #1c1c3a;
  padding: 1rem;
  margin-bottom: 1rem;
}

button {
  display: block;
  margin: 0.3rem 0;
  padding: 0.5rem;
  width: 100%;
}
.correct { background: green; }
.wrong { background: red; }
</style>
</head>

<body>

<h1>Quiz · Electrónica Digital</h1>

<div class="card">
  <p>1. ¿Qué es una UCE?</p>
  <button onclick="check(this,true)">Unidad de control del vehículo</button>
  <button onclick="check(this,false)">Un sensor mecánico</button>
  <button onclick="check(this,false)">Un actuador hidráulico</button>
</div>

<div class="card">
  <p>2. El sistema binario utiliza:</p>
  <button onclick="check(this,false)">0-2-4-8</button>
  <button onclick="check(this,true)">0 y 1</button>
  <button onclick="check(this,false)">A-B-C-D</button>
</div>

<div class="card">
  <p>3. PWM sirve para:</p>
  <button onclick="check(this,true)">Controlar potencia mediante pulsos</button>
  <button onclick="check(this,false)">Medir presión de aceite</button>
  <button onclick="check(this,false)">Refrigerar el motor</button>
</div>

<script>
function check(btn, correct){
  if(correct){
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
  }
}
</script>

</body>
</html>
