<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.titulo }} — {{ site.title | default: "Aula Virtual" }}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0a0f1d;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Contenedor de Diapositivas */
        .presentation-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            height: 100vh;
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .slide.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos de Contenido (Maquetación) */
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        ul { list-style-position: inside; margin-top: 1rem; }
        li { margin-bottom: 0.75rem; color: var(--text-muted); }
        strong { color: var(--text-main); }

        .formula-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed var(--primary);
            padding: 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            font-size: 1.25rem;
            color: #60a5fa;
        }

        /* Botones de Navegación e Interfaz */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.primary { background: var(--primary); border-color: transparent; }
        .nav-btn.primary:hover { background: #2563eb; }

        /* Pantalla de Inicio (Hero) */
        .hero-slide { text-align: center; padding: 2rem 0; }
        .hero-title { font-size: 3rem; font-weight: 800; line-height: 1.2; margin: 1.5rem 0; }
        .hero-subtitle { color: var(--text-muted); max-width: 600px; margin: 0 auto 2.5rem; }
        .hero-btn { background: var(--primary); border: none; color: white; padding: 1rem 2rem; border-radius: 99px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
        
        .hero-stats { display: flex; justify-content: center; gap: 3rem; margin-bottom: 2.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #60a5fa; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }

        /* Cabeceras de bloque */
        .block-header { margin-bottom: 2rem; }
        .block-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a78bfa; margin-bottom: 0.5rem; }
        .block-title { font-size: 2rem; font-weight: 700; }
        .block-desc { color: var(--text-muted); margin-top: 0.25rem; }
    </style>
</head>
<body>

    <main class="presentation-container">
        {{ content }}
    </main>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function goToSlide(index) {
            if (index >= 0 && index < slides.length) {
                // Desactivar diapositiva actual
                slides[currentSlide].classList.remove('active');
                // Actualizar índice
                currentSlide = index;
                // Activar nueva diapositiva
                slides[currentSlide].classList.add('active');
            }
        }

        // Control por teclado (Flechas izquierda/derecha)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                goToSlide(currentSlide + 1);
            } else if (e.key === 'ArrowLeft') {
                goToSlide(currentSlide - 1);
            }
        });
    </script>

</body>
</html>
